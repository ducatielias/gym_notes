<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shark: Gym & Fitness</title>
    
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/index-core.css">
    <link rel="stylesheet" href="css/index-components.css">
    <link rel="stylesheet" href="css/index-modals.css">
    <link rel="stylesheet" href="css/index-workout.css">
    <link rel="stylesheet" href="css/gym-session.css">
    <link rel="stylesheet" href="css/gym-exercises.css">
    <link rel="stylesheet" href="css/gym-plan.css">
</head>
<body>

    <main id="main-content">
        
        <section id="screen-today" class="screen">
            <header class="screen-header">
                <h1>Shark: Gym & Fitness</h1>
            </header>
            <div class="empty-state">
                <p>📅 Tu actividad de hoy aparecerá aquí.</p>
            </div>
        </section>

        <section id="screen-plan" class="screen hidden">
            <div id="plan-container"></div>
        </section>

        <section id="screen-history" class="screen hidden">
            <header class="screen-header">
                <h1>Historial</h1>
            </header>
            <div class="empty-state">
                <p>⏳ No hay sesiones registradas aún.</p>
            </div>
        </section>

        <section id="screen-exercises" class="screen hidden">
            <div id="exercises-container"></div>
        </section>

        <section id="screen-editor" class="screen hidden">
            <div id="session-editor-ui"></div>
        </section>

        <section id="screen-exercise-editor" class="screen hidden">
            <div id="exercise-editor-ui"></div>
        </section>

    </main>

    <button id="globalScrollTopBtn" class="btn-scroll-top" onclick="scrollToTopGlobal()" title="Volver al inicio">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('today')">
            <i class="fa-solid fa-calendar-day"></i>
            <span>Hoy</span>
        </button>
        <button class="nav-item" onclick="switchTab('plan')">
            <i class="fa-solid fa-dumbbell"></i>
            <span>Plan</span>
        </button>
        <button class="nav-item" onclick="switchTab('history')">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Historial</span>
        </button>
        <button class="nav-item" onclick="switchTab('exercises')">
            <i class="fa-solid fa-list-check"></i>
            <span>Ejercicios</span>
        </button>
    </nav>

    <!-- MODAL DE ENTRENAMIENTO ACTIVO -->
    <div id="active-workout" class="modal-overlay" style="display:none; align-items: stretch; justify-content: stretch; background: var(--background-color);">
        <div class="aw-container">
            <div class="aw-header">
                <div class="aw-header-top">
                    <div id="aw-title-small" class="aw-title">Entrenando: <span id="aw-session-title"></span></div>
                    <button onclick="mostrarHistorialEntrenamientoActual()" class="aw-history-btn" title="Historial de esta sesión">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </button>
                    <button onclick="cerrarEntrenamiento()" class="aw-close-btn" title="Cerrar (sin guardar)">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="aw-timers-container">
                    <div class="timer-item">
                        <span class="timer-label">TOTAL</span>
                        <span class="timer-value" id="aw-timer-total">00:00</span>
                        <div class="timer-controls">
                            <button class="aw-finish-btn-inline" onclick="finalizarEntrenamiento()">Terminar</button>
                        </div>
                    </div>
                    <div class="timer-item timer-clickable" id="timer-descanso-area">
                        <span class="timer-label">DESCANSO</span>
                        <span class="timer-value" id="aw-timer-descanso">01:00</span>
                        <div class="timer-controls">
                            <button id="btn-descanso-play" onclick="iniciarDescanso()"><i class="fa-solid fa-play"></i></button>
                            <button id="btn-descanso-pause" onclick="pausarDescanso()" style="display:none;"><i class="fa-solid fa-pause"></i></button>
                            <button onclick="resetearDescanso()"><i class="fa-solid fa-rotate-left"></i></button>
                        </div>
                    </div>
                    <div class="timer-item timer-clickable" id="timer-trabajo-area">
                        <span class="timer-label">TIMER</span>
                        <span class="timer-value" id="aw-timer-trabajo">00:00</span>
                        <div class="timer-controls">
                            <button id="btn-timer-play" onclick="iniciarTimer()"><i class="fa-solid fa-play"></i></button>
                            <button id="btn-timer-pause" onclick="pausarTimer()" style="display:none;"><i class="fa-solid fa-pause"></i></button>
                            <button onclick="resetearTimer()"><i class="fa-solid fa-rotate-left"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="aw-tools-row">
                <button class="aw-tool-toggle" id="aw-format-btn" data-type="format" onclick="toggleSectionEntrenamiento('format')">
                    <i class="fa-solid fa-sliders"></i> Formato
                </button>
                <button class="aw-tool-toggle" id="aw-exercises-btn" data-type="exercises" onclick="toggleSectionEntrenamiento('exercises')">
                    <i class="fa-solid fa-dumbbell"></i> Ejercicios Gym
                </button>
            </div>

            <div class="expandable-wrapper" id="aw-toolbar-wrapper">
                <div id="aw-toolbar-container">
                    <span class="ql-formats">
                        <button class="ql-bold"></button>
                        <button class="ql-italic"></button>
                        <button class="ql-underline"></button>
                    </span>
                    <span class="ql-formats">
                        <button class="ql-list" value="ordered"></button>
                        <button class="ql-list" value="bullet"></button>
                    </span>
                </div>
            </div>

            <div class="expandable-wrapper" id="aw-exercises-wrapper">
                <div class="aw-exercises-content">
                    <input type="search" class="search-input" id="aw-search-exercise" placeholder="Busca un ejercicio..." oninput="filtrarEjerciciosEntrenamiento()" onsearch="filtrarEjerciciosEntrenamiento()">
                    <ul class="exercises-list" id="aw-exercises-list"></ul>
                </div>
            </div>

            <div class="aw-content" id="aw-content-area">
                <div id="aw-editor-container" class="aw-editor-container"></div>
            </div>
        </div>
    </div>

    <!-- MODAL PERSONALIZADO -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <span id="modalIcon" class="modal-icon"></span>
                <h3 id="modalTitle">Aviso</h3>
            </div>
            <div class="modal-body">
                <p id="modalMessage"></p>
                <input type="text" id="modalInput" class="modal-input hidden" autocomplete="off">
            </div>
            <div class="modal-footer">
                <button id="modalCancelBtn" class="modal-btn modal-btn-secondary hidden">Cancelar</button>
                <button id="modalConfirmBtn" class="modal-btn modal-btn-primary">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- MODAL HISTORIAL DE ENTRENAMIENTO -->
    <div id="modal-historial-entreno-actual" class="modal-overlay hidden" style="z-index: 2500;">
        <div class="modal-content" style="max-height: 85vh; display: flex; flex-direction: column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0; font-size:1.4rem;">Historial de esta sesión</h2>
                <button onclick="cerrarModalHistorialEntrenoActual()" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
            <div id="historial-entreno-lista" style="flex:1; overflow-y:auto;"></div>
            <button onclick="cerrarModalHistorialEntrenoActual()" style="margin-top:15px; padding:12px; border:none; border-radius:12px; background:#eee; font-weight:bold;">Cerrar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    
    <!-- JS - CORE -->
    <script src="js/index.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/ui-helpers.js"></script>
    
    <!-- JS - PLAN -->
    <script src="js/plan-state.js"></script>
    <script src="js/plan-menus.js"></script>
    <script src="js/plan-routines.js"></script>
    <script src="js/plan-sessions.js"></script>
    <script src="js/plan.js"></script>
    
    <!-- JS - EXERCISES -->
    <script src="js/exercises-state.js"></script>
    <script src="js/exercises-render.js"></script>
    <script src="js/exercises-crud.js"></script>
    <script src="js/exercises-import-export.js"></script>
    <script src="js/exercises-share.js"></script>
    <script src="js/exercises.js"></script>
    
    <!-- JS - WORKOUT & SESSION -->
    <script src="js/workout.js"></script>
    <script src="js/gym-session.js"></script>

</body>
</html>
